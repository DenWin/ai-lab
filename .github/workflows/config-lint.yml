name: config-lint

on:
  pull_request:
    paths:
      - "**/*.adoc"
      - "**/*.asciidoc"
      - "**/*.json"
      - "**/*.md"
      - "**/*.yaml"
      - "**/*.yml"
      - ".asciidoctor-lint.yml"
      - ".github/workflows/config-lint.yml"
      - ".github/workflows/scripts/**"
      - ".markdownlint.json"
      - "AGENTS.md"
      - "anthropic/**"
      - "docs/**"
      - "instructions/**"
      - "shared/**"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  push:
    branches: [main]
    paths:
      - "**/*.adoc"
      - "**/*.asciidoc"
      - "**/*.json"
      - "**/*.md"
      - "**/*.yaml"
      - "**/*.yml"
      - ".asciidoctor-lint.yml"
      - ".github/workflows/config-lint.yml"
      - ".github/workflows/scripts/**"
      - ".markdownlint.json"
      - "AGENTS.md"
      - "anthropic/**"
      - "docs/**"
      - "instructions/**"
      - "shared/**"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  config-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          bash .github/workflows/scripts/ci/determin-diff-range.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

      - name: Setup Node (for markdownlint)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Ruby (for AsciiDoc lint)
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          ruby-version: "3.3"

      - name: Install linters
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/install-linters.sh

      - name: Lint YAML
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/lint-yaml.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Validate JSON syntax
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/validate-json.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Lint Markdown
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/lint-markdown.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Lint AsciiDoc
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/lint-asciidoc.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Lint shell scripts
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/lint-shell.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/validate-js-syntax.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: config-lint-reports
          path: reports

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          bash .github/workflows/scripts/config-lint/write-summary.sh
