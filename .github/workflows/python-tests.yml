name: python-tests

on:
  pull_request:
    paths:
      - "**/*.py"
      - ".github/workflows/python-tests.yml"
      - "ai-artifacts/**/tests/**"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - ".github/workflows/python-tests.yml"
      - "ai-artifacts/**/tests/**"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          bash .github/workflows/scripts/ci/determin-diff-range.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        shell: bash
        run: |
          bash .github/workflows/scripts/python-tests/install-test-dependencies.sh

      - name: Discover test files
        id: discover
        shell: bash
        run: |
          bash .github/workflows/scripts/python-tests/discover-test-files.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Run pytest
        if: steps.discover.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/python-tests/run-pytest.sh "${{ steps.discover.outputs.files }}"

      - name: No tests found
        if: steps.discover.outputs.count == '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/python-tests/no-tests-found.sh
