name: powershell-quality

on:
  pull_request:
    paths:
      - "**/*.ps1"
      - "**/*.psd1"
      - "**/*.psm1"
      - ".github/workflows/powershell-quality.yml"
      - "coding-policies/languages/powershell-policy.yaml"
      - "coding-policies/polyglot-policy.yaml"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  push:
    branches: [main]
    paths:
      - "**/*.ps1"
      - "**/*.psd1"
      - "**/*.psm1"
      - ".github/workflows/powershell-quality.yml"
      - "coding-policies/languages/powershell-policy.yaml"
      - "coding-policies/polyglot-policy.yaml"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  powershell-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          bash .github/workflows/scripts/ci/determin-diff-range.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

      - name: Find PowerShell files
        id: psfiles
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-quality/find-powershell-files.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Run PSScriptAnalyzer
        if: steps.psfiles.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-quality/run-psscriptanalyzer.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Validate PowerShell syntax (pwsh Core)
        if: steps.psfiles.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-quality/validate-powershell-syntax.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Upload PowerShell reports
        if: always() && steps.psfiles.outputs.count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: powershell-quality-reports
          path: reports

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-quality/write-summary.sh "${{ steps.psfiles.outputs.count }}"
