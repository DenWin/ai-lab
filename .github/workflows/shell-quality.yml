name: shell-quality

on:
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shell-quality.yml"
      - "coding-policies/languages/bash-policy.yaml"
      - "coding-policies/polyglot-policy.yaml"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shell-quality.yml"
      - "coding-policies/languages/bash-policy.yaml"
      - "coding-policies/polyglot-policy.yaml"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          bash .github/workflows/scripts/ci/determin-diff-range.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

      - name: Find shell files
        id: shfiles
        shell: bash
        run: |
          bash .github/workflows/scripts/shell-quality/find-shell-files.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Install ShellCheck
        if: steps.shfiles.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/shell-quality/install-shellcheck.sh

      - name: Run ShellCheck
        if: steps.shfiles.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/shell-quality/run-shellcheck.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Upload shell reports
        if: always() && steps.shfiles.outputs.count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: shell-quality-reports
          path: reports

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          bash .github/workflows/scripts/shell-quality/write-summary.sh "${{ steps.shfiles.outputs.count }}"
