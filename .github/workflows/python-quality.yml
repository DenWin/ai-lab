name: python-quality

on:
  pull_request:
    paths:
      - "**/*.py"
      - ".github/workflows/python-quality.yml"
      - "pyproject.toml"
      - "ruff.toml"
      - "setup.cfg"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - ".github/workflows/python-quality.yml"
      - "pyproject.toml"
      - "ruff.toml"
      - "setup.cfg"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          bash .github/workflows/scripts/ci/determin-diff-range.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tools
        shell: bash
        run: |
          bash .github/workflows/scripts/python-quality/install-tools.sh

      - name: Find Python files
        id: pyfiles
        shell: bash
        run: |
          bash .github/workflows/scripts/python-quality/find-python-files.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Ruff check
        if: steps.pyfiles.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/python-quality/ruff-check.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Ruff format check
        if: steps.pyfiles.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/python-quality/ruff-format-check.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Upload python reports
        if: always() && steps.pyfiles.outputs.count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: python-quality-reports
          path: reports

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          bash .github/workflows/scripts/python-quality/write-summary.sh "${{ steps.pyfiles.outputs.count }}"
