name: powershell-tests

on:
  pull_request:
    paths:
      - "**/*.Tests.ps1"
      - ".github/workflows/powershell-tests.yml"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  push:
    branches: [main]
    paths:
      - "**/*.Tests.ps1"
      - ".github/workflows/powershell-tests.yml"
      - "!.scratch/*/artefacts/**"
      - "!.scratch/*/artifacts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  powershell-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          bash .github/workflows/scripts/ci/determin-diff-range.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

      - name: Install Pester
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-tests/install-pester.sh

      - name: Discover test files
        id: discover
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-tests/discover-test-files.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Run Pester
        if: steps.discover.outputs.count != '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-tests/run-pester.sh "${{ steps.discover.outputs.files }}"

      - name: No tests found
        if: steps.discover.outputs.count == '0'
        shell: bash
        run: |
          bash .github/workflows/scripts/powershell-tests/no-tests-found.sh
