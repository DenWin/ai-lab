name: policy-check

on:
  pull_request:
    paths:
      - "**/*.adoc"
      - "**/*.asciidoc"
      - "**/*.json"
      - "**/*.md"
      - "**/*.ps1"
      - "**/*.psd1"
      - "**/*.psm1"
      - "**/*.py"
      - "**/*.sh"
      - "**/*.yaml"
      - "**/*.yml"
      - ".github/**"
      - ".github/workflows/scripts/**"
      - ".scratch/**"
      - "AGENTS.md"
      - "anthropic/**"
      - "coding-policies/**"
      - "docs/**"
      - "instructions/**"
      - "shared/**"
  push:
    branches: [main]
    paths:
      - "**/*.adoc"
      - "**/*.asciidoc"
      - "**/*.json"
      - "**/*.md"
      - "**/*.ps1"
      - "**/*.psd1"
      - "**/*.psm1"
      - "**/*.py"
      - "**/*.sh"
      - "**/*.yaml"
      - "**/*.yml"
      - ".github/**"
      - ".github/workflows/scripts/**"
      - ".scratch/**"
      - "AGENTS.md"
      - "anthropic/**"
      - "coding-policies/**"
      - "docs/**"
      - "instructions/**"
      - "shared/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          bash .github/workflows/scripts/ci/determin-diff-range.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

      - name: Enforce repo guardrails
        shell: bash
        run: |
          bash .github/workflows/scripts/policy-check/enforce-repo-guardrails.sh "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

      - name: Setup Python (policy validation)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate coding policies
        shell: bash
        run: |
          bash .github/workflows/scripts/policy-check/validate-coding-policies.sh

      - name: Upload policy reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: policy-check-reports
          path: reports

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          bash .github/workflows/scripts/policy-check/write-summary.sh
